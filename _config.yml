about_title: About Me # (Use this to override about section title)
about_profile_image: images/IMG_2710.jpg #Directory of profile image (eg. images/profile.jpg)
about_content: | # this will include new lines to allow paragraphs
 I'm a Ph.D. candidate in the Computer Science and Engineering department at University of California, San Diego, working at the System Energy Efficiency Lab ([SEE Lab](http://varys.ucsd.edu)) with Professor Tajana Simunic Rosing.

 My research focuses on building secure and privacy-preserving machine learning systems. I work on fully homomorphic encryption, secure ML inference and training, encrypted federated learning, private retrieval, hyperdimensional computing, and GPU/system optimization for encrypted computation.

 I am currently looking for research scientist, research engineer, and ML/systems engineering roles in trustworthy AI and privacy-preserving infrastructure. Feel free to reach out at [yujinnam@ucsd.edu](mailto:yujinnam@ucsd.edu).

